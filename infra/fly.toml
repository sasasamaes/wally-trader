# Fly.io app config for the FastAPI backend.
#
# Usage:
#   fly launch --no-deploy --copy-config --name wally-api
#   fly secrets set DATABASE_URL=... REDIS_URL=... MASTER_KEK=... CLERK_SECRET_KEY=...
#   fly deploy

app = "wally-api"
primary_region = "iad"  # Virginia — close to Stripe + most LLM providers

[build]
  dockerfile = "../api/Dockerfile"
  build-context = ".."

[env]
  ENV = "production"
  LOG_LEVEL = "INFO"
  API_V1_PREFIX = "/api/v1"
  CORS_ALLOWED_ORIGINS = "[\"https://app.wallytrader.com\"]"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"     # scale to zero when idle (Hobby tier)
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 75

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpus = 1

[processes]
  app = "uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
  # workers will be added in Phase 3 once ARQ jobs land:
  # workers = "uv run arq workers.main.WorkerSettings"
