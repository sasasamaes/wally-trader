<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wally Trader — Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Wally Trader Dashboard</h1>
        <div id="health-status">Connecting...</div>
        <div id="last-updated"></div>
    </header>

    <main>
        <section id="profiles-section">
            <h2>Profiles</h2>
            <div id="profiles-grid">Loading...</div>
        </section>

        <section id="portfolio-section">
            <h2>Portfolio Heat</h2>
            <div id="portfolio-heat">Loading...</div>
        </section>

        <section id="positions-section">
            <h2>Open Positions</h2>
            <div id="positions-table">Loading...</div>
        </section>

        <section id="discipline-section">
            <h2>Discipline (bitunix)</h2>
            <div id="discipline-info">Loading...</div>
        </section>

        <section id="calibration-section">
            <h2>Calibration</h2>
            <div id="calibration-info">Loading...</div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
