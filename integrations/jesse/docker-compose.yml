# Jesse — Docker Compose
#
# Alineado con el stack oficial: https://github.com/jesse-ai/jesse-stack-docker
# (imagen salehmir/jesse:latest, postgres:14-alpine como "db", dashboard en :8888,
#  visor de trades jesse-trades-info en :3000). Reconcilia siempre con la guía oficial
# https://docs.jesse.trade/docs/getting-started/docker — los docs bloquean fetch automatizado.
#
# Uso:  cp .env.example .env  &&  docker compose up -d   (primera vez tarda al bajar imágenes)
# Dashboard:  http://localhost:8888

services:
  jesse:
    image: salehmir/jesse:latest
    container_name: jesse
    tty: true
    depends_on:
      - db
      - jesse-trades-info
    environment:
      ENV_DATABASES_POSTGRES_HOST: "db"
    ports:
      - "${JESSE_PORT:-8888}:8888"      # dashboard / REST / (MCP se sirve desde aquí)
    volumes:
      - ./jesseData:/home
    restart: unless-stopped

  jesse-trades-info:
    image: jessetradesinfo/jesse-trades-info:v0.2.1
    container_name: jesse-trades-info
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_NAME: ${POSTGRES_NAME:-jesse_db}
      DB_USER: ${POSTGRES_USERNAME:-jesse_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-password}
      DB_PORT: 5432
    ports:
      - "3000:3000"
    restart: unless-stopped

  db:
    image: postgres:14-alpine
    container_name: jesse-db
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-jesse_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_NAME:-jesse_db}
      POSTGRES_HOST_AUTH_METHOD: password
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./dbData:/var/lib/postgresql/data
    restart: unless-stopped
